<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asteria Crystal Tarot | 白魔法．塔羅．感情拯救</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Gemini API Import Map -->
    <script type="importmap">
{
  "imports": {
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/client": "https://aistudiocdn.com/react-dom@^19.2.0/client",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>

    <!-- Tailwind Config & Custom CSS -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              asteria: {
                blue: '#D6EAF8',
                yellow: '#FCF3CF',
                purple: '#E8DAEF',
                pink: '#FADBD8',
                dark: '#5D6D7E',
                primary: '#A569BD'
              }
            },
            fontFamily: {
              sans: ['Noto Sans TC', 'sans-serif'],
              eng: ['Quicksand', 'sans-serif'],
            },
            animation: {
              'float': 'float 3s ease-in-out infinite',
              'bounce-slow': 'bounce 2s infinite',
              'spin-slow': 'spin 8s linear infinite',
              'spin-slow-reverse': 'spin 10s linear infinite reverse',
              'ping-slow': 'ping 2s cubic-bezier(0, 0, 0.2, 1) infinite',
              'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
              'fade-in': 'fadeIn 0.5s ease-out forwards',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #fdfbf7;
        background-image: radial-gradient(#E8DAEF 1px, transparent 1px), radial-gradient(#D6EAF8 1px, transparent 1px);
        background-position: 0 0, 25px 25px;
        background-size: 50px 50px;
        color: #4A5568;
        scroll-behavior: smooth;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(8px);
        border: 2px solid white;
        box-shadow: 0 10px 25px -5px rgba(165, 105, 189, 0.15);
      }
      .btn-primary {
        background: linear-gradient(135deg, #A569BD, #8E44AD);
        color: white;
        transition: all 0.3s ease;
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(165, 105, 189, 0.3);
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 8px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #f1f1f1;
        border-radius: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #A569BD;
        border-radius: 4px;
      }
      .logo-img {
        object-fit: contain;
        background-color: transparent;
      }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body class="antialiased font-sans text-gray-800 selection:bg-asteria-primary selection:text-white">
    <div id="root"></div>

<script type="module" src="/index.tsx"></script>
</body>
</html>
