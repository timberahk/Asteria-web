[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "http://www.asteria-tarot.com/*"
  to = "https://asteria-tarot.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.asteria-tarot.com/*"
  to = "https://asteria-tarot.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://asteria-tarot.com/*"
  to = "https://asteria-tarot.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/teaching"
  to = "/teaching/"
  status = 301
  force = true

[[redirects]]
  from = "/teaching.html"
  to = "/teaching/"
  status = 301
  force = true

[[redirects]]
  from = "/services"
  to = "/services/"
  status = 301
  force = true

[[redirects]]
  from = "/services.html"
  to = "/services/"
  status = 301
  force = true

[[redirects]]
  from = "/reviews"
  to = "/reviews/"
  status = 301
  force = true

[[redirects]]
  from = "/reviews.html"
  to = "/reviews/"
  status = 301
  force = true

[[redirects]]
  from = "/about"
  to = "/about/"
  status = 301
  force = true

[[redirects]]
  from = "/about.html"
  to = "/about/"
  status = 301
  force = true

[[redirects]]
  from = "/cases"
  to = "/cases/"
  status = 301
  force = true

[[redirects]]
  from = "/cases.html"
  to = "/cases/"
  status = 301
  force = true

[[redirects]]
  from = "/oracle"
  to = "/oracle/"
  status = 301
  force = true

[[redirects]]
  from = "/articles/:id"
  to = "/articles/:id/"
  status = 301
  force = true

[[redirects]]
  from = "/article-:id"
  to = "/articles/:id/"
  status = 301
  force = true

[[redirects]]
  from = "/article/:id"
  to = "/articles/:id/"
  status = 301
  force = true

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
